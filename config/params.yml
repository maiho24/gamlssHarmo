# gamlssHarmo configuration
# All options can be overridden via CLI arguments.
# Run: gamlssHarmo <stage> --help

data:
  raw_csv:        "data/raw/my_data.csv"
  harmonised_csv: ""

output:
  base:       "output"
  models:     "output/models"
  harmonised: "output/harmonised"
  plots:      "output/plots"
  logs:       "output/logs"

# Feature selection.
# features_txt: one feature name per line; lines starting with '#' are ignored.
# feature:      single feature override (takes priority over features_txt).
# If both are blank, all non-metadata columns are used.
features:
  features_txt: "config/features.txt"
  feature:      ""

model:
  batch_var:     "cohort"   # column identifying batch/site/scanner
  id_var:        "id"       # subject ID column (passthrough; enters formulas only if listed)
  age_var:      "age"
  longitudinal: false      # if true, formulas_longitudinal is used instead of formulas
  log_transform: false      # apply log(y+1) before z-standardising

  # Ordered list of distribution families. The fitter stops at first convergence.
  # Within each family, nu/tau specs are tried in decreasing complexity automatically.
  family_order:
    - "SHASH"
    - "GG"
    - "NO"

  # Per-parameter formula term lists.
  # Terms are joined with '+' to form the RHS of each distributional parameter.
  # Placeholders: {batch} -> batch_var, {id} -> id_var
  # null means intercept-only (~ 1). Term lists are used exactly as written.
  formulas:
    mu:    ["pb(age)", "sex", "random({batch})"]
    sigma: ["random({batch})", "pb(age)", "sex"]
    nu:    ["random({batch})"]
    tau:   ["random({batch})"]

  formulas_longitudinal:
    mu:    ["pb(age)", "sex", "random({batch})", "random({id})"]
    sigma: ["random({batch})", "pb(age)", "sex"]
    nu:    ["random({batch})"]
    tau:   ["random({batch})"]

compute:
  n_cores: 1

plot:
  group_col:     "cohort"
  smooth_method: "loess"    # loess or gam
  age_bin_width: 5
  fix_y_limits:  true
